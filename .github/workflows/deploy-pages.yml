name: Deploy Gordon Game Hub to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate runtime Firebase config
        run: |
          cat > js/firebase-config.local.js <<'EOF'
          window.GORDON_FIREBASE_CONFIG = {
            apiKey: "${{ secrets.GGH_FIREBASE_API_KEY }}",
            authDomain: "${{ secrets.GGH_FIREBASE_AUTH_DOMAIN }}",
            databaseURL: "${{ secrets.GGH_FIREBASE_DATABASE_URL }}",
            projectId: "${{ secrets.GGH_FIREBASE_PROJECT_ID }}",
            storageBucket: "${{ secrets.GGH_FIREBASE_STORAGE_BUCKET }}",
            messagingSenderId: "${{ secrets.GGH_FIREBASE_MESSAGING_SENDER_ID }}",
            appId: "${{ secrets.GGH_FIREBASE_APP_ID }}"
          };
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
