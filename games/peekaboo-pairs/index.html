<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <meta name="theme-color" content="#0ea5e9" />
    <title>Peekaboo Pairs • Gordon Game Hub</title>
    <link rel="stylesheet" href="../../css/styles.css" />
    <style>
      body{overflow:auto}
      .gameShell{min-height:100vh;padding:16px;display:flex;flex-direction:column;gap:12px}
      .topRow{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
      .title{font-family:"Fredoka",ui-rounded,system-ui;font-weight:900;font-size:clamp(28px,4.5vw,44px);color:#06233b;margin:0}
      .hud{display:flex;align-items:center;gap:10px;flex-wrap:wrap;font-weight:900}
      .card{background:rgba(255,255,255,.9);border:2px solid rgba(255,255,255,.7);border-radius:26px;padding:14px;box-shadow:0 18px 46px rgba(0,0,0,.16)}
      .prompt{text-align:center;font-weight:900;font-size:clamp(24px,4vw,34px);font-family:"Fredoka",ui-rounded,system-ui;margin-bottom:10px}
      .grid{display:grid;grid-template-columns:repeat(3,minmax(90px,1fr));gap:12px;max-width:720px;margin:0 auto}
      .tile{height:120px;border:none;border-radius:20px;background:linear-gradient(135deg,#c4b5fd,#bae6fd);font-size:2.2rem;cursor:pointer;box-shadow:0 10px 22px rgba(0,0,0,.14)}
      .tile.open,.tile.matched{background:linear-gradient(135deg,#bbf7d0,#67e8f9)}
      .row{display:flex;justify-content:center;gap:12px;margin-top:12px;flex-wrap:wrap;font-family:"Fredoka",ui-rounded,system-ui;font-size:clamp(22px,3vw,30px);font-weight:900}
      .badge{padding:8px 14px;border-radius:14px;background:#fff7ed;border:2px solid #fdba74}
    </style>
  </head>
  <body>
    <div class="clouds" aria-hidden="true"></div>
    <div class="gameShell">
      <div class="topRow">
        <h1 class="title">Peekaboo Pairs</h1>
        <div class="hud">
          <a class="btn hubBtn" href="../../index.html">← Back to Hub</a>
          <button class="btn secondary iconBtn" id="musicToggle" type="button" aria-label="Music" title="Music"></button>
        </div>
      </div>
      <div class="card">
        <div class="prompt">Find the matching animal friends!</div>
        <div id="grid" class="grid"></div>
        <div class="row">
          <div class="badge">Stars: <span id="stars">0</span></div>
          <div class="badge">Matches: <span id="matches">0</span>/3</div>
        </div>
      </div>
    </div>
    <audio id="bgMusic" preload="auto"><source src="../../assets/music.mp3" type="audio/mpeg"/></audio>
    <script src="./peekaboo-pairs.js" defer></script>
  </body>
</html>
