<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
    <meta name="theme-color" content="#0ea5e9" />
    <title>Shape Words - Gordon Game Hub</title>
    <link rel="stylesheet" href="../../css/styles.css" />
    <style>
      body{ overflow:auto; }
      .gameShell{ min-height:100vh; padding:16px; display:flex; flex-direction:column; gap:12px; }
      .topRow{ display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap; }
      .title{ font-family:"Fredoka", ui-rounded, system-ui; font-weight:900; font-size:clamp(28px,4.5vw,44px); color:#06233b; margin:0; }
      .hud{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; font-weight:900; }
      .card{
        flex:1;
        background:rgba(255,255,255,0.88);
        border:2px solid rgba(255,255,255,0.68);
        border-radius:26px;
        padding:16px;
        box-shadow:0 18px 46px rgba(0,0,0,0.16);
        backdrop-filter:blur(8px);
        display:grid;
        grid-template-rows:auto 1fr auto auto;
        gap:14px;
      }
      .prompt{
        text-align:center;
        font-weight:900;
        font-size:clamp(24px,3.7vw,36px);
        opacity:0.86;
        font-family:"Fredoka", ui-rounded, system-ui;
      }
      .shapeStage{
        min-height:240px;
        border-radius:24px;
        background:linear-gradient(180deg,rgba(186,230,253,0.58),rgba(167,243,208,0.54));
        display:grid;
        place-items:center;
        overflow:hidden;
        position:relative;
      }
      .shapeStage::before{
        content:"";
        position:absolute;
        inset:14px;
        border:4px dashed rgba(14,165,233,0.20);
        border-radius:22px;
      }
      .shapeArt{
        position:relative;
        z-index:1;
        width:min(270px,56vw);
        aspect-ratio:1;
        display:grid;
        place-items:center;
      }
      .shapeArt svg{ width:100%; height:100%; filter:drop-shadow(0 14px 20px rgba(15,23,42,0.18)); }
      .wordGrid{
        display:grid;
        grid-template-columns:repeat(1,minmax(0,1fr));
        gap:12px;
        max-width:900px;
        width:100%;
        margin:0 auto;
      }
      @media (min-width:720px){ .wordGrid{ grid-template-columns:repeat(3,minmax(0,1fr)); } }
      .wordBtn{
        border:none;
        border-radius:24px;
        min-height:86px;
        padding:12px;
        font-family:"Fredoka", ui-rounded, system-ui;
        font-size:clamp(28px,4vw,44px);
        font-weight:900;
        color:#06233b;
        background:linear-gradient(135deg,rgba(96,165,250,0.36),rgba(244,114,182,0.32));
        box-shadow:0 14px 30px rgba(0,0,0,0.16);
        cursor:pointer;
      }
      .wordBtn:active{ transform:translateY(1px) scale(0.99); }
      .good{ outline:7px solid rgba(16,185,129,0.50); }
      .bad{ outline:7px solid rgba(239,68,68,0.38); }
      .feedback{
        min-height:34px;
        text-align:center;
        font-family:"Fredoka", ui-rounded, system-ui;
        font-weight:900;
        font-size:clamp(20px,3vw,30px);
        color:#075985;
      }
      .scoreRow{
        display:flex;
        align-items:center;
        justify-content:center;
        gap:14px;
        font-weight:900;
        font-size:clamp(24px,3.5vw,34px);
        opacity:0.85;
        font-family:"Fredoka", ui-rounded, system-ui;
      }
      .confetti{
        position:fixed;
        inset:0;
        pointer-events:none;
        opacity:0;
        z-index:20;
      }
      .confetti.show{ opacity:1; animation:confettiFade 1400ms ease-out forwards; }
      @keyframes confettiFade{
        0%{ opacity:0; }
        8%{ opacity:1; }
        70%{ opacity:1; }
        100%{ opacity:0; }
      }
      .confetti::before{
        content:"";
        position:absolute;
        inset:-20% -10%;
        background:
          radial-gradient(circle at 10% 10%, rgba(250,204,21,0.75) 0 10px, transparent 11px),
          radial-gradient(circle at 22% 18%, rgba(52,211,153,0.75) 0 10px, transparent 11px),
          radial-gradient(circle at 34% 12%, rgba(96,165,250,0.75) 0 10px, transparent 11px),
          radial-gradient(circle at 46% 20%, rgba(244,114,182,0.75) 0 10px, transparent 11px),
          radial-gradient(circle at 58% 14%, rgba(167,139,250,0.75) 0 10px, transparent 11px),
          radial-gradient(circle at 70% 22%, rgba(34,211,238,0.75) 0 10px, transparent 11px),
          radial-gradient(circle at 82% 16%, rgba(251,113,133,0.75) 0 10px, transparent 11px),
          radial-gradient(circle at 92% 24%, rgba(250,204,21,0.75) 0 10px, transparent 11px),
          radial-gradient(circle at 14% 34%, rgba(52,211,153,0.70) 0 9px, transparent 10px),
          radial-gradient(circle at 28% 40%, rgba(96,165,250,0.70) 0 9px, transparent 10px),
          radial-gradient(circle at 44% 36%, rgba(244,114,182,0.70) 0 9px, transparent 10px),
          radial-gradient(circle at 62% 42%, rgba(167,139,250,0.70) 0 9px, transparent 10px),
          radial-gradient(circle at 78% 38%, rgba(34,211,238,0.70) 0 9px, transparent 10px),
          radial-gradient(circle at 90% 44%, rgba(251,113,133,0.70) 0 9px, transparent 10px);
        transform:translateY(-8%);
        animation:confettiFall 1400ms ease-out forwards;
      }
      @keyframes confettiFall{
        0%{ transform:translateY(-22%); }
        100%{ transform:translateY(34%); }
      }
    </style>
  </head>
  <body>
    <div class="clouds" aria-hidden="true"></div>
    <div class="confetti" id="confetti" aria-hidden="true"></div>

    <div class="gameShell">
      <div class="topRow">
        <h1 class="title">Shape Words</h1>
        <div class="hud">
          <a class="btn hubBtn" href="../../index.html">Back to Hub</a>
          <button class="btn secondary iconBtn" id="musicToggle" type="button" aria-label="Music" title="Music"></button>
        </div>
      </div>

      <div class="card" aria-label="Shape Words game">
        <div class="prompt" id="prompt">Pick the word for this shape</div>
        <div class="shapeStage">
          <div class="shapeArt" id="shapeArt" aria-hidden="true"></div>
        </div>
        <div class="wordGrid" id="wordGrid" aria-label="Shape word choices"></div>
        <div class="feedback" id="feedback" aria-live="polite"></div>
        <div class="scoreRow" aria-label="Score">
          <span>Score:</span> <span id="score">0</span>
        </div>
      </div>
    </div>

    <audio id="bgMusic" preload="auto">
      <source src="../../assets/music.mp3" type="audio/mpeg" />
    </audio>

    <script src="../../js/zoom-lock.js" defer></script>
    <script src="./shape-words.js" defer></script>
  </body>
</html>
